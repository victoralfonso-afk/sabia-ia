<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sabiá IA Pro API Real</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *{font-family:Inter,Arial,sans-serif}
    body{background:#09090b;color:white}
    .glass{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(14px)}
    .bubble-user{background:#2563eb;margin-left:auto}
    .bubble-ai{background:#18181b}
  </style>
</head>
<body>
<div class="min-h-screen grid lg:grid-cols-[280px_1fr]">
  <aside class="glass p-4 hidden lg:block">
    <h1 class="text-2xl font-extrabold">Sabiá IA Pro</h1>
    <p class="text-zinc-400 text-sm mb-5">Conectado em API real</p>
    <button onclick="newChat()" class="w-full bg-blue-600 rounded-xl p-3 font-bold mb-4">Novo chat</button>
    <div class="space-y-2">
      <button onclick="setMode('chat')" class="w-full text-left bg-zinc-900 rounded-xl p-3">💬 Chat</button>
      <button onclick="setMode('codigo')" class="w-full text-left bg-zinc-900 rounded-xl p-3">💻 Código</button>
      <button onclick="setMode('imagem')" class="w-full text-left bg-zinc-900 rounded-xl p-3">🎨 Prompt imagem</button>
      <button onclick="setMode('negocios')" class="w-full text-left bg-zinc-900 rounded-xl p-3">📊 Negócios</button>
      <button onclick="setMode('arquivos')" class="w-full text-left bg-zinc-900 rounded-xl p-3">📎 Arquivos</button>
    </div>
  </aside>

  <main class="h-screen flex flex-col">
    <header class="glass p-4 flex justify-between">
      <div>
        <h2 id="title" class="font-bold text-xl">Chat</h2>
        <p id="status" class="text-xs text-zinc-400">Verificando API...</p>
      </div>
    </header>

    <section id="chat" class="flex-1 overflow-y-auto p-4 space-y-4">
      <div class="bubble-ai rounded-2xl p-4 max-w-3xl">Olá! Estou conectado à API real. Faça seu pedido.</div>
    </section>

    <footer class="glass p-4">
      <div class="flex gap-2">
        <textarea id="input" rows="1" class="flex-1 bg-black border border-zinc-700 rounded-2xl p-4 outline-none" placeholder="Digite aqui..."></textarea>
        <button onclick="send()" class="bg-blue-600 rounded-2xl px-6 font-bold">Enviar</button>
      </div>
    </footer>
  </main>
</div>

<script>
let history = JSON.parse(localStorage.getItem("sabia_history") || "[]");
let mode = "chat";

function save(){ localStorage.setItem("sabia_history", JSON.stringify(history)); }
function setMode(m){ mode=m; document.getElementById("title").textContent = m; }
function add(text, who){
  const div=document.createElement("div");
  div.className=(who==="user"?"bubble-user":"bubble-ai")+" rounded-2xl p-4 max-w-3xl whitespace-pre-wrap";
  div.textContent=text;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop=document.getElementById("chat").scrollHeight;
  return div;
}
function newChat(){
  history=[];
  save();
  document.getElementById("chat").innerHTML="";
  add("Novo chat iniciado.", "ai");
}
async function check(){
  try{
    const r=await fetch("/api/status");
    const j=await r.json();
    document.getElementById("status").textContent=j.message;
  }catch(e){
    document.getElementById("status").textContent="API offline";
  }
}
async function send(){
  const input=document.getElementById("input");
  const message=input.value.trim();
  if(!message)return;
  input.value="";
  add(message,"user");
  const loading=add("Pensando...","ai");

  try{
    const r=await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message, history, mode})
    });
    const j=await r.json();
    loading.textContent=j.reply || j.error || "Erro sem resposta.";
    history.push({role:"user",content:message});
    history.push({role:"assistant",content:loading.textContent});
    history=history.slice(-20);
    save();
  }catch(e){
    loading.textContent="Erro ao conectar na API: "+e.message;
  }
}
check();
</script>
</body>
</html>
